<!DOCTYPE html>
<html>
    <head>
        <title>Page Title</title>
        <link href="./style/style.css" rel="stylesheet" type="text/css">
        <link href="./style/bntstyle_2.css" rel="stylesheet" type="text/css">
        <link href="./style/editor.css" rel="stylesheet" type="text/css">
    </head>
    <body>
        <div id="gameCanavas">
            <canvas class="gameCanvas" id="canvasBackground" width="400" height="300"></canvas>
            <canvas class="gameCanvas" id="canvas" tabindex='1' width="400" height="300"></canvas>
            <canvas class="gameCanvas" id="canvasDebug" width="400" height="300"></canvas>
            <div id = "ui">
                <div class="uiSceen" id="inGame">
                </div>
                <div class="uiSceen" id="blackBackground"></div>
                <div class="uiSceen" id="pauseMenu">
                    <h1>PAUSE</h1>
                    <button id = "pauseMainMenu" class="bnt">Main Menu</button>
                    <button id = "pauseOption" class="bnt bntOption">option</button>
                    <button id = "pauseBack" class="bnt bntBack">back</button>
                </div>
                <div class="uiSceen" id="loadingScreen">
                    <div class="loading">
                        <h3>Loading</h3><div class="loadingIcon"></div>
                    </div>
                </div>
                <div class="uiSceen" id="mainMenu">
                    <div class="logo"></div>
                    <button id = "mainLocal" class="bnt bntLocal">Local</button>
                    <button id = "mainEditor" class="bnt">Editor</button>
                    <button id = "mainOnline" class="bnt bntOnline">Online</button>
                    <button id = "mainOption" class="bnt bntOption">Option</button>
                </div>
                <div class="uiSceen" id="option">
                    <button id = "optionBack" class="bnt bntBack">back</button>
                </div>
                <div class="uiSceen" id="online">
                </div>
                <div class="uiSceen" id="createRoom">
                </div>
                <div class="uiSceen" id="joinRoom">
                </div>
                <div id = "debugLabel">
                </div>
                <div id="transition" hidden>
                </div>
            </div>
            <div id="tilePreview"><canvas width="120" height="120"></canvas></div>
        </div>
        <script src="./src/app.js" type="module"></script>
    </body>
</html>
