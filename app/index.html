<!DOCTYPE html>
<html>
    <head>
        <title>Page Title</title>
        <link href="./style/style.css" rel="stylesheet" type="text/css">
        <link href="./style/inputs.css" rel="stylesheet" type="text/css">
        <link href="./style/bntstyle_2.css" rel="stylesheet" type="text/css">
        <link href="./style/editor.css" rel="stylesheet" type="text/css">
        <link href="./style/colorAndIcons.css" rel="stylesheet" type="text/css">
    </head>
    <body>
        <div id="gameCanavas">
            <canvas class="gameCanvas" id="canvasBackground" width="400" height="300"></canvas>
            <canvas class="gameCanvas" id="canvas" tabindex='1' width="400" height="300"></canvas>
            <canvas class="gameCanvas" id="canvasDebug" width="400" height="300"></canvas>
            <canvas class="gameCanvas" id="canvasEditorOverlay" width="400" height="300"></canvas>
            <div id = "ui">
                <div class="uiSceen" id="inGame">
                    <div class="timer"><label id="actualTime">67:67</label><label class="timerMilis" id="actualTimeMilis">.67</label></div>
                </div>

                <div class="uiSceen" id="blackBackground"></div>

                <div class="uiSceen" id="tab">
                    <div id="tabObject" class="tabObject">
                        <h3 id="tabObjectTitle" class="tabTitle">title</h3>
                        <div id="tabObjectList">
                            <div class="tabEntry"><label class="runPlacement">1</label><label class="runUsername">username</label><label class="runTime">00:10.022</label></div>
                            <div class="tabEntry"><label class="runPlacement">2</label><label class="runUsername">usernadme</label><label class="runTime">00:10.022</label></div>
                            <div class="tabEntry"><label class="runPlacement">3</label><label class="runUsername">userna4me</label><label class="runTime">00:10.022</label></div>
                            <div class="tabEntry"><label class="runPlacement">4</label><label class="runUsername">userna5me</label><label class="runTime">00:10.022</label></div>
                            <div class="tabEntry"><label class="runPlacement">4</label><label class="runUsername">userna5me</label><label class="runTime">00:10.022</label></div>
                            <div class="tabEntry"><label class="runPlacement">4</label><label class="runUsername">userna5me</label><label class="runTime">00:10.022</label></div>
                            <div class="tabEntry"><label class="runPlacement">4</label><label class="runUsername">userna5me</label><label class="runTime">00:10.022</label></div>
                            <div class="tabEntry"><label class="runPlacement">4</label><label class="runUsername">userna5me</label><label class="runTime">00:10.022</label></div>
                            <div class="tabEntry"><label class="runPlacement">4</label><label class="runUsername">userna5me</label><label class="runTime">00:10.022</label></div>

                        </div>

                    </div>
                </div>

                <div class="uiSceen" id="endScreen">
                    <div id="endMenuContainer">
                        <div class="menuTitle">Finish</div>
                        <div class="time">Time : <label  id="endTime" class="runTime">20:00.000</label></div>
                        <button id = "endReplay" class="bnt playColor"><div class="bntIcon iconLocal"></div>Replay</button>
                        <button id = "endMainMenu" class="bnt"><div class="bntIcon iconMain"></div>Main Menu</button>
                    </div>
                </div>

                <div id="editorTopBar" hidden>
                    <button class="bnt editorToolBtn" id="editorUndo"><div class="bntIcon iconUndo"></div><span class="editorBtnLabel">Undo</span></button>
                    <button class="bnt editorToolBtn" id="editorRedo"><div class="bntIcon iconRedo"></div><span class="editorBtnLabel">Redo</span></button>
                    <span class="editorSeparator"></span>
                    <button class="bnt" id="editorNew"><div class="bntIcon iconNew"></div><span class="editorBtnLabel">New</span></button>
                    <button class="bnt" id="editorLoad"><div class="bntIcon iconLoad"></div><span class="editorBtnLabel">Load</span></button>
                    <button class="bnt" id="editorSave"><div class="bntIcon iconSave"></div><span class="editorBtnLabel">Save</span></button>
                    <button class="bnt" id="editorSaveAs"><div class="bntIcon iconSaveAs"></div><span class="editorBtnLabel">Save As</span></button>
                    <button class="bnt" id="editorUpload"><div class="bntIcon iconUpload"></div><span class="editorBtnLabel">Upload</span></button>
                    <span class="editorSeparator"></span>
                    <button class="bnt editorToggleBtn editorRectOff" id="editorRect"><div class="bntIcon iconRect"></div><span class="editorBtnLabel">Rect</span></button>
                    <button class="bnt editorToolBtn active" id="editorDraw"><div class="bntIcon iconDraw"></div><span class="editorBtnLabel">Draw</span></button>
                    <button class="bnt editorToolBtn" id="editorErase"><div class="bntIcon iconErase"></div><span class="editorBtnLabel">Erase</span></button>
                    <button class="bnt editorToolBtn" id="editorPan"><div class="bntIcon iconPan"></div><span class="editorBtnLabel">Pan</span></button>
                    <span class="editorSeparator"></span>
                    <label id="editorLevelName">Untitled</label>
                    <button class="bnt" id="editorTest"><div class="bntIcon iconTest"></div><span class="editorBtnLabel">Test</span></button>
                </div>

                <div id="editorBottomBar" hidden>
                    <div class="editorDropdown" id="editorDropdownTerrain">
                        <button class="bnt editorDropdownBtn">
                            <canvas class="editorDropdownIcon" width="20" height="20"></canvas><span class="editorBtnLabel">Terrain</span>
                        </button>
                        <div class="editorDropdownPanel"></div>
                    </div>
                    <div class="editorDropdown" id="editorDropdownHazards">
                        <button class="bnt editorDropdownBtn">
                            <canvas class="editorDropdownIcon" width="20" height="20"></canvas><span class="editorBtnLabel">Hazards</span>
                        </button>
                        <div class="editorDropdownPanel"></div>
                    </div>
                    <div class="editorDropdown" id="editorDropdownMechanics">
                        <button class="bnt editorDropdownBtn">
                            <canvas class="editorDropdownIcon" width="20" height="20"></canvas><span class="editorBtnLabel">Mechanics</span>
                        </button>
                        <div class="editorDropdownPanel"></div>
                    </div>
                    <div class="editorDropdown" id="editorDropdownLogic">
                        <button class="bnt editorDropdownBtn">
                            <canvas class="editorDropdownIcon" width="20" height="20"></canvas><span class="editorBtnLabel">Logic</span>
                        </button>
                        <div class="editorDropdownPanel"></div>
                    </div>
                </div>

                <div class="uiSceen" id="pauseMenu">
                    <div class="menuTitle">Pause</div>
                    <button id = "pauseMainMenu" class="bnt"><div class="bntIcon iconMain"></div>Main Menu</button>
                    <button id = "pauseOption" class="bnt optionColor"><div class="bntIcon iconOption"></div>option</button>
                    <button id = "pauseBack"class="bnt bntBack"><div class="bntIcon iconBack"></div>Back</button>
                </div>

                <div class="uiSceen" id="loadingScreen">
                    <div class="loading">
                        <h3>Loading</h3><div class="loadingIcon"></div>
                    </div>
                </div>

                <div class="uiSceen" id="mainMenu">
                    <div class="logo"></div>
                    <button id = "mainLocal" class="bnt playColor"><div class="bntIcon iconLocal"></div>Local</button>
                    <button id = "mainEditor" class="bnt"><div class="bntIcon iconEditor"></div>Build</button>
                    <button id = "mainOnline" class="bnt onlineColor"><div class="bntIcon iconOnline"></div>Online</button>
                    <button id = "mainOption" class="bnt optionColor"><div class="bntIcon iconOption"></div>Option</button>
                    <button id = "mainCredit" class="bnt creditColor"><div class="bntIcon iconCredit"></div>Credit</button>
                </div>

                <div class="uiSceen" id="local">
                    <div class="menuTitle"><div class="bntIcon iconLocal"></div> Local</div>
                    <button id = "localCampaign" class="bnt playColor"><div class="bntIcon iconLocal"></div>Campaign</button>
                    <button id = "localImport" class="bnt playColor"><div class="bntIcon iconFile"></div>Import file</button>
                    <button class="bnt bntBack"><div class="bntIcon iconBack"></div>Back</button>
                </div>

                <div class="uiSceen" id="option">
                    <div class="menuTitle"><div class="bntIcon iconOption"></div> Option</div>
                    <div id="optionContainer">
                        <h3>Player</h3>
                        <input id="optionUsername" type="text" class="textInput optionColor" maxlength="10" placeholder="Username"/>
                        <button id="optionUsernameSave" class="bnt optionColor"><div class="bntIcon iconSave"></div>Save</button>
                        <h3>Controlles</h3>
                        <div id="controllesContainer"></div>
                    </div>
                    <button class="bnt bntBack"><div class="bntIcon iconBack"></div>Back</button>
                </div>

                <div class="uiSceen" id="keyChange" tabindex="1" >
                    <h2>Input name</h2>
                    <div id="keyChangeList"class="keyList"></div>
                    <button id="keyChangeSave" class="bnt optionColor"><div class="bntIcon iconSave"></div>Save</button>
                    <button id="keyChangeBack" class="bnt bntBack"><div class="bntIcon iconBack"></div>Back</button>
                </div>


                <div class="uiSceen" id="credit">
                    <div class="menuTitle"><div class="bntIcon iconCredit"></div> Credit</div>
                    <div class="creditHolder">
                        <div class="creditItem" id="creditTB"><div class="drawing"></div>Theo Bensaci</div>
                        <div class="creditItem" id="creditSS"><div class="drawing"></div>Santiago Sugrañes</div>
                        <div class="creditItem" id="creditMR"><div class="drawing"></div>Maxime Regenass</div>
                    </div>
                    <button class="bnt bntBack"><div class="bntIcon iconBack"></div>Back</button>
                </div>

                <div class="uiSceen" id="online">
                    <div class="menuTitle"><div class="bntIcon iconOnline"></div> Online</div>
                    <button id = "onlineCreate" class="bnt onlineColor"><div class="bntIcon iconPlus"></div>Create a room</button>
                    <button id = "onlineJoin" class="bnt onlineColor"><div class="bntIcon iconJoin"></div>Join a room</button>
                    <button class="bnt bntBack"><div class="bntIcon iconBack"></div>Back</button>
                </div>

                <div class="uiSceen" id="createRoom">
                    <div class="menuTitle"><div class="bntIcon iconPlus"></div> Create Room</div>
                    <div id="mapContainer">
                        <div class="mapEntry"><label class="mapName">NameLONG ndmenmda OMg</label><label class="mapId">38291</label></div>
                        <div class="mapEntry"><label class="mapName">Name</label><label class="mapId">38291</label></div>
                        <div class="mapEntry"><label class="mapName">Name</label><label class="mapId">38291</label></div>
                        <div class="mapEntry"><label class="mapName">Name</label><label class="mapId">38291</label></div>
                        <div class="mapEntry"><label class="mapName">Name</label><label class="mapId">38291</label></div>
                        <div class="mapEntry"><label class="mapName">Name</label><label class="mapId">38291</label></div>
                        <div class="mapEntry"><label class="mapName">Name</label><label class="mapId">38291</label></div>
                        <div class="mapEntry"><label class="mapName">Name</label><label class="mapId">38291</label></div>
                        <div class="mapEntry"><label class="mapName">Name</label><label class="mapId">38291</label></div>
                        <div class="mapEntry"><label class="mapName">Name</label><label class="mapId">38291</label></div>
                        <div class="mapEntry"><label class="mapName">Name</label><label class="mapId">38291</label></div>
                        <div class="mapEntry"><label class="mapName">Name</label><label class="mapId">38291</label></div>
                        <div class="mapEntry"><label class="mapName">Name</label><label class="mapId">38291</label></div>
                        <div class="mapEntry"><label class="mapName">Name</label><label class="mapId">38291</label></div>
                    </div>
                    <input id="createMapId" type="text" class="textInput onlineColor" maxlength="8" placeholder="Map Id"/>
                    <button id = "createCreate" class="bnt onlineColor"><div class="bntIcon iconPlus"></div>Create</button>
                    <button class="bnt bntBack"><div class="bntIcon iconBack"></div>Back</button>
                </div>

                <div class="uiSceen" id="joinRoom">
                    <div class="menuTitle"><div class="bntIcon iconJoin"></div> Joine Room</div>
                    <input id="joinCode" type="text" class="textInput onlineColor" maxlength="8" placeholder="Room Code"/>
                    <button id = "joinJoin" class="bnt onlineColor" disabled><div class="bntIcon iconJoin"></div>Join</button>
                    <button class="bnt bntBack"><div class="bntIcon iconBack"></div>Back</button>
                </div>

                <div id = "debugLabel">
                </div>

                <div class="uiSceen" id="editorDialogName" hidden>
                    <div class="editorDialog">
                        <div class="editorDialogTitle" id="editorDialogNameTitle">New Level</div>
                        <input id="editorDialogNameInput" type="text" class="textInput" maxlength="30" placeholder="Level Name">
                        <div class="editorDialogButtons">
                            <button id="editorDialogNameConfirm" class="bnt">Confirm</button>
                            <button id="editorDialogNameCancel" class="bnt">Cancel</button>
                        </div>
                    </div>
                </div>

                <div class="uiSceen" id="editorDialogWarning" hidden>
                    <div class="editorDialog">
                        <div class="editorDialogMessage">You have unsaved changes. What would you like to do?</div>
                        <div class="editorDialogButtons">
                            <button id="editorDialogWarningSave" class="bnt editorDialogBtnSave">Save first</button>
                            <button id="editorDialogWarningDiscard" class="bnt editorDialogBtnDiscard">Discard</button>
                            <button id="editorDialogWarningCancel" class="bnt">Cancel</button>
                        </div>
                    </div>
                </div>

                <div class="uiSceen" id="editorDialogConfirm" hidden>
                    <div class="editorDialog">
                        <div class="editorDialogMessage" id="editorDialogConfirmMsg"></div>
                        <div class="editorDialogButtons">
                            <button id="editorDialogConfirmYes" class="bnt">Yes</button>
                            <button id="editorDialogConfirmNo" class="bnt">Cancel</button>
                        </div>
                    </div>
                </div>

                <div id="transition" hidden>
                </div>
            </div>
            <div id="tilePreview"><canvas width="120" height="120"></canvas></div>
        </div>
        <script src="./src/app.js" type="module"></script>
    </body>
</html>
